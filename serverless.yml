service: analytics-notifications-slack

provider:
  name: aws
  runtime: provided.al2023
  architecture: arm64
  timeout: 380
  stage: ${opt:stage, self:custom.defaultStage}
  region: ap-northeast-1
  environment:
    ${file(./env.yml)}

plugins:
  - serverless-plugin-scripts

custom:
  defaultStage: dev
  # スケジュール実行は prod ステージでのみ有効にする。
  # それ以外のステージ(dev等)ではデプロイされるが EventBridge ルールは無効化される。
  scheduleEnabled:
    prod: true
  scripts:
    hooks:
      # ローカルでのビルド時に bootstrap を生成する
      'before:package:createDeploymentArtifacts': GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o bootstrap handler/main.go

package:
  patterns:
    - '!./**'
    - ./bootstrap
    - ./secret.json

functions:
  analyticsNotificationsSlack:
    handler: bootstrap
    events:
      - schedule:
          rate: cron(0 8 * * ? *) # UTC
          enabled: ${self:custom.scheduleEnabled.${sls:stage}, false}
