service: analytics-notifications-slack

provider:
  name: aws
  runtime: provided.al2023
  architecture: arm64
  timeout: 380
  stage: ${opt:stage, self:custom.defaultStage}
  region: ap-northeast-1
  environment:
    ${file(./env.yml)}

plugins:
  - serverless-plugin-scripts

# スケジュール実行は prod ステージでのみ有効にする。
# それ以外のステージ(dev等)ではルールはデプロイされるが無効化される。
# ステージごとの値は params で定義する。
params:
  default:
    scheduleEnabled: false
  prod:
    scheduleEnabled: true

custom:
  defaultStage: dev
  scripts:
    hooks:
      # ローカルでのビルド時に bootstrap を生成する
      'before:package:createDeploymentArtifacts': GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o bootstrap handler/main.go

package:
  patterns:
    - '!./**'
    - ./bootstrap
    - ./secret.json

functions:
  analyticsNotificationsSlack:
    handler: bootstrap
    events:
      - schedule:
          rate: cron(0 8 * * ? *) # UTC
          enabled: ${param:scheduleEnabled}
